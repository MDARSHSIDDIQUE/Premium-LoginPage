<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        :root {
            --bg-image: url("assets/premium-login-bg-v3.png");
            --text: #f8fbff;
            --muted: rgba(248, 251, 255, 0.68);
            --dark: #071012;
            --glass: rgba(9, 16, 18, 0.58);
            --glass-strong: rgba(255, 255, 255, 0.11);
            --glass-border: rgba(255, 255, 255, 0.22);
            --field: rgba(255, 255, 255, 0.09);
            --field-border: rgba(255, 255, 255, 0.18);
            --accent: #4bc3b4;
            --accent-2: #d6b06c;
            --danger: #ff7a90;
            --success: #7df0b0;
            --shadow: 0 32px 90px rgba(0, 0, 0, 0.5);
        }

        * {
            box-sizing: border-box;
        }

        html {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            width: 100%;
            height: 100vh;
            margin: 0;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: var(--text);
            background:
                radial-gradient(ellipse at center, rgba(35, 55, 57, 0.2), rgba(2, 5, 7, 0.74) 70%),
                linear-gradient(180deg, rgba(1, 4, 6, 0.12), rgba(1, 4, 6, 0.68)),
                var(--bg-image) center / cover fixed no-repeat;
            overflow: hidden;
        }

        body::before,
        body::after {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
        }

        body::before {
            background:
                radial-gradient(ellipse at center, transparent 0 38%, rgba(0, 0, 0, 0.44) 100%),
                linear-gradient(90deg, rgba(255, 255, 255, 0.032) 1px, transparent 1px);
            background-size: auto, 112px 112px;
            mask-image: linear-gradient(180deg, transparent, #000 18%, #000 78%, transparent);
        }

        body::after {
            background:
                linear-gradient(115deg, transparent 0 36%, rgba(255, 255, 255, 0.08) 37%, transparent 38% 100%),
                linear-gradient(250deg, transparent 0 61%, rgba(214, 176, 108, 0.12) 62%, transparent 64% 100%);
            mix-blend-mode: screen;
            animation: lightSweep 12s ease-in-out infinite alternate;
        }

        button,
        input {
            font: inherit;
        }

        button {
            border: 0;
        }

        .page {
            position: relative;
            width: 100%;
            height: 100vh;
            display: grid;
            place-items: center;
            padding: 28px;
            isolation: isolate;
        }

        .page::before,
        .page::after {
            content: "";
            position: fixed;
            pointer-events: none;
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.09), rgba(255, 255, 255, 0.018));
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(16px);
            opacity: 0.55;
            z-index: -1;
        }

        .page::before {
            width: 420px;
            height: 220px;
            left: calc(50% - 520px);
            top: calc(50% - 210px);
            border-radius: 28px;
            transform: rotate(-8deg);
        }

        .page::after {
            width: 360px;
            height: 190px;
            right: calc(50% - 500px);
            bottom: calc(50% - 250px);
            border-radius: 26px;
            transform: rotate(7deg);
        }

        .login-wrap {
            position: relative;
            width: min(100%, 476px);
            perspective: 1200px;
        }

        .login-wrap::before {
            content: "";
            position: absolute;
            inset: -1px;
            border-radius: 34px;
            background: linear-gradient(135deg, rgba(75, 195, 180, 0.28), rgba(255, 255, 255, 0.12), rgba(214, 176, 108, 0.25));
            filter: blur(20px);
            opacity: 0.42;
            transform: translateY(16px);
            z-index: -1;
        }

        .login-wrap::after {
            content: "";
            position: absolute;
            inset: -22px;
            z-index: -2;
            border: 1px solid rgba(255, 255, 255, 0.11);
            border-radius: 42px;
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.07), rgba(255, 255, 255, 0.018)),
                rgba(255, 255, 255, 0.02);
            box-shadow:
                0 24px 90px rgba(0, 0, 0, 0.28),
                inset 0 1px 0 rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
        }

        .login-card {
            position: relative;
            overflow: hidden;
            width: 100%;
            padding: 36px;
            border: 1px solid rgba(255, 255, 255, 0.24);
            border-radius: 32px;
            background:
                linear-gradient(145deg, rgba(255, 255, 255, 0.18), rgba(255, 255, 255, 0.05)),
                var(--glass);
            box-shadow: var(--shadow), inset 0 1px 0 rgba(255, 255, 255, 0.24);
            backdrop-filter: blur(26px) saturate(1.1);
            transform-style: preserve-3d;
            transition: transform 220ms ease, border-color 220ms ease, box-shadow 220ms ease;
            animation: cardIn 760ms ease both;
        }

        .login-card::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at 20% 0%, rgba(255, 255, 255, 0.14), transparent 24%),
                linear-gradient(180deg, rgba(255, 255, 255, 0.12), transparent 18%),
                linear-gradient(120deg, rgba(255, 255, 255, 0.18), transparent 28%, transparent 70%, rgba(75, 195, 180, 0.12));
            pointer-events: none;
        }

        .login-card::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(110deg, transparent 0 38%, rgba(255, 255, 255, 0.18) 48%, transparent 58% 100%);
            transform: translateX(-120%);
            transition: transform 900ms ease;
            pointer-events: none;
        }

        .login-card:hover {
            border-color: rgba(255, 255, 255, 0.34);
            box-shadow: 0 38px 104px rgba(0, 0, 0, 0.56), inset 0 1px 0 rgba(255, 255, 255, 0.3);
        }

        .login-card:hover::after {
            transform: translateX(120%);
        }

        .login-card > * {
            position: relative;
            z-index: 1;
        }

        .brand {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 30px;
        }

        .brand-left {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
        }

        .brand-mark {
            width: 46px;
            height: 46px;
            display: grid;
            place-items: center;
            flex: 0 0 auto;
            border: 1px solid rgba(255, 255, 255, 0.34);
            border-radius: 15px;
            background:
                linear-gradient(135deg, rgba(75, 195, 180, 0.26), rgba(214, 176, 108, 0.14)),
                rgba(255, 255, 255, 0.08);
            box-shadow:
                0 18px 44px rgba(0, 0, 0, 0.26),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        .brand-mark svg {
            width: 25px;
            height: 25px;
        }

        .brand-name {
            display: block;
            font-size: 15px;
            font-weight: 900;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .status-pill {
            min-height: 32px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 0 11px;
            border: 1px solid rgba(125, 240, 176, 0.24);
            border-radius: 999px;
            background: rgba(125, 240, 176, 0.08);
            color: rgba(226, 255, 239, 0.94);
            font-size: 11px;
            font-weight: 850;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .status-pill::before {
            content: "";
            width: 7px;
            height: 7px;
            border-radius: 999px;
            background: var(--success);
            box-shadow: 0 0 18px var(--success);
        }

        .login-header {
            margin-bottom: 26px;
        }

        .login-title-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 18px;
        }

        .login-header h1 {
            margin: 0;
            font-size: 40px;
            line-height: 1.08;
            letter-spacing: 0;
        }

        .watch-eyes {
            --eye-x: 0px;
            --eye-y: 0px;
            position: relative;
            width: 112px;
            height: 48px;
            flex: 0 0 112px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 9px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 999px;
            background:
                radial-gradient(circle at 34% 28%, rgba(255, 255, 255, 0.18), transparent 22%),
                linear-gradient(135deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.045));
            box-shadow:
                0 14px 32px rgba(0, 0, 0, 0.22),
                inset 0 1px 0 rgba(255, 255, 255, 0.18);
            overflow: hidden;
            backdrop-filter: blur(16px);
            transition: transform 180ms ease, border-color 180ms ease, background 180ms ease;
        }

        .watch-eyes::before,
        .watch-eyes::after {
            content: "";
            position: absolute;
            top: 9px;
            width: 31px;
            height: 7px;
            border-top: 2px solid rgba(255, 255, 255, 0.36);
            border-radius: 50%;
            opacity: 0.68;
            transition: transform 260ms ease, opacity 180ms ease;
        }

        .watch-eyes::before {
            left: 19px;
            transform: rotate(-8deg);
        }

        .watch-eyes::after {
            right: 19px;
            transform: rotate(8deg);
        }

        .watch-eyes.active {
            border-color: rgba(75, 195, 180, 0.38);
            transform: translateY(-1px);
        }

        .watch-eyes.active::before,
        .watch-eyes.active::after {
            opacity: 0.82;
        }

        .human-eye {
            position: relative;
            width: 42px;
            height: 23px;
            display: grid;
            place-items: center;
            overflow: hidden;
            border-radius: 68% 32% 64% 36% / 54% 46% 54% 46%;
            background:
                radial-gradient(circle at 34% 32%, rgba(255, 255, 255, 0.95) 0 13%, transparent 14%),
                linear-gradient(145deg, rgba(248, 252, 250, 0.96), rgba(207, 227, 224, 0.84));
            box-shadow:
                inset 0 -4px 10px rgba(5, 20, 21, 0.18),
                inset 0 4px 8px rgba(255, 255, 255, 0.3),
                0 0 0 1px rgba(255, 255, 255, 0.2);
            transform: scaleY(1);
            transition: transform 260ms cubic-bezier(.2, .8, .2, 1), opacity 180ms ease;
            animation: naturalBlink 8s infinite;
        }

        .human-eye:nth-child(2) {
            border-radius: 32% 68% 36% 64% / 46% 54% 46% 54%;
        }

        .human-eye::before,
        .human-eye::after {
            content: "";
            position: absolute;
            left: -3px;
            right: -3px;
            height: 50%;
            z-index: 2;
            background:
                linear-gradient(180deg, rgba(38, 47, 48, 0.98), rgba(10, 17, 19, 0.98));
            transition: transform 340ms cubic-bezier(.22, 1, .36, 1);
        }

        .human-eye::before {
            top: 0;
            border-radius: 0 0 80% 80%;
            transform: translateY(-105%);
        }

        .human-eye::after {
            bottom: 0;
            border-radius: 80% 80% 0 0;
            transform: translateY(105%);
        }

        .eye-pupil {
            position: relative;
            z-index: 1;
            width: 13px;
            height: 13px;
            border-radius: 50%;
            background:
                radial-gradient(circle at 35% 29%, #ffffff 0 9%, transparent 10%),
                radial-gradient(circle at center, #050b0d 0 36%, #3d7f78 38% 62%, #163f3e 64% 100%);
            box-shadow:
                0 0 10px rgba(75, 195, 180, 0.22),
                inset 0 0 0 1px rgba(255, 255, 255, 0.22);
            transform: translate(var(--eye-x), var(--eye-y));
            transition: transform 90ms ease, opacity 160ms ease;
        }

        .watch-eyes.closed .human-eye::before,
        .watch-eyes.closed .human-eye::after {
            transform: translateY(0);
        }

        .watch-eyes.closed .human-eye {
            transform: scaleY(0.26);
            animation: none;
        }

        .watch-eyes.closed .eye-pupil {
            opacity: 0;
            transform: translate(0, 0);
        }

        .login-header p {
            margin: 10px 0 0;
            color: var(--muted);
            font-size: 15px;
            line-height: 1.6;
        }

        .social-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 22px;
        }

        .social-btn,
        .primary-btn,
        .ghost-link,
        .icon-btn {
            cursor: pointer;
            transition: transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease, background 180ms ease;
        }

        .social-btn {
            min-height: 50px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.13), rgba(255, 255, 255, 0.07));
            color: var(--text);
            font-weight: 800;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.12);
        }

        .social-btn:hover {
            transform: translateY(-2px);
            border-color: rgba(75, 195, 180, 0.38);
            background: rgba(255, 255, 255, 0.14);
            box-shadow: 0 16px 34px rgba(0, 0, 0, 0.22);
        }

        .social-icon {
            display: grid;
            place-items: center;
            width: 24px;
            height: 24px;
            border-radius: 9px;
            background: rgba(255, 255, 255, 0.17);
            font-size: 13px;
            font-weight: 950;
        }

        .divider {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            gap: 13px;
            margin-bottom: 22px;
            color: rgba(248, 251, 255, 0.52);
            font-size: 11px;
            font-weight: 900;
            letter-spacing: 0.14em;
            text-transform: uppercase;
        }

        .divider::before,
        .divider::after {
            content: "";
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.24), transparent);
        }

        .field {
            margin-bottom: 16px;
        }

        .field label {
            display: block;
            margin-bottom: 8px;
            color: rgba(248, 251, 255, 0.86);
            font-size: 13px;
            font-weight: 850;
        }

        .input-wrap {
            position: relative;
        }

        .input-icon {
            position: absolute;
            top: 50%;
            left: 15px;
            width: 20px;
            height: 20px;
            transform: translateY(-50%);
            color: rgba(248, 251, 255, 0.48);
            pointer-events: none;
            transition: color 180ms ease;
        }

        .field input {
            width: 100%;
            min-height: 56px;
            padding: 0 16px 0 46px;
            border: 1px solid var(--field-border);
            border-radius: 17px;
            outline: 0;
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.11), rgba(255, 255, 255, 0.075));
            color: var(--text);
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.13),
                0 10px 28px rgba(0, 0, 0, 0.08);
            transition: border-color 180ms ease, box-shadow 180ms ease, background 180ms ease;
        }

        .field input::placeholder {
            color: rgba(248, 251, 255, 0.42);
        }

        .field input:focus {
            border-color: rgba(75, 195, 180, 0.62);
            background: rgba(255, 255, 255, 0.13);
            box-shadow: 0 0 0 5px rgba(75, 195, 180, 0.12), inset 0 1px 0 rgba(255, 255, 255, 0.16);
        }

        .field input:focus + .input-icon {
            color: var(--accent);
        }

        .password input {
            padding-right: 66px;
        }

        .icon-btn {
            position: absolute;
            top: 50%;
            right: 8px;
            width: 46px;
            min-height: 40px;
            display: grid;
            place-items: center;
            transform: translateY(-50%);
            border-radius: 13px;
            background: rgba(255, 255, 255, 0.1);
            color: rgba(248, 251, 255, 0.78);
        }

        .icon-btn:hover {
            background: rgba(75, 195, 180, 0.14);
            color: var(--text);
        }

        .icon-btn svg {
            width: 19px;
            height: 19px;
        }

        .strength {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
            margin-top: 9px;
        }

        .strength span {
            height: 4px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.14);
            transition: background 180ms ease, box-shadow 180ms ease;
        }

        .strength[data-level="1"] span:nth-child(-n + 1),
        .strength[data-level="2"] span:nth-child(-n + 2) {
            background: var(--danger);
        }

        .strength[data-level="3"] span:nth-child(-n + 3) {
            background: var(--accent-2);
        }

        .strength[data-level="4"] span {
            background: var(--success);
            box-shadow: 0 0 12px rgba(125, 240, 176, 0.48);
        }

        .form-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            margin: 8px 0 22px;
            color: rgba(248, 251, 255, 0.68);
            font-size: 13px;
            font-weight: 750;
        }

        .remember {
            display: inline-flex;
            align-items: center;
            gap: 9px;
            cursor: pointer;
        }

        .remember input {
            width: 18px;
            height: 18px;
            accent-color: var(--accent);
        }

        .ghost-link {
            padding: 0;
            background: transparent;
            color: var(--accent);
            font-weight: 900;
        }

        .ghost-link:hover {
            color: #a4fff0;
            transform: translateY(-1px);
        }

        .primary-btn {
            position: relative;
            width: 100%;
            min-height: 56px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            overflow: hidden;
            border-radius: 18px;
            background:
                linear-gradient(135deg, rgba(255, 255, 255, 0.18), transparent 35%),
                linear-gradient(135deg, #4bc3b4, #176f67 60%, #b88f49);
            color: #ffffff;
            font-size: 15px;
            font-weight: 950;
            letter-spacing: 0.01em;
            box-shadow: 0 18px 38px rgba(14, 92, 86, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.24);
        }

        .primary-btn::after {
            content: "";
            position: absolute;
            top: -55%;
            bottom: -55%;
            left: -35%;
            width: 32%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.42), transparent);
            transform: rotate(18deg);
            transition: left 560ms ease;
        }

        .primary-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 24px 48px rgba(14, 92, 86, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.3);
        }

        .primary-btn:hover::after {
            left: 118%;
        }

        .primary-btn[disabled] {
            cursor: wait;
            opacity: 0.86;
        }

        .spinner {
            width: 18px;
            height: 18px;
            display: none;
            border: 2px solid rgba(255, 255, 255, 0.38);
            border-top-color: #ffffff;
            border-radius: 999px;
            animation: spin 750ms linear infinite;
        }

        .primary-btn.loading .spinner {
            display: block;
        }

        .message {
            min-height: 22px;
            margin: 14px 0 0;
            color: rgba(248, 251, 255, 0.72);
            font-size: 13px;
            line-height: 1.5;
            text-align: center;
        }

        .message.error {
            color: var(--danger);
        }

        .message.success {
            color: var(--success);
        }

        .signup {
            margin: 18px 0 0;
            color: rgba(248, 251, 255, 0.66);
            font-size: 14px;
            text-align: center;
        }

        .signup .ghost-link {
            font-size: 14px;
        }

        .toast {
            position: fixed;
            left: 50%;
            bottom: 24px;
            min-width: min(320px, calc(100% - 32px));
            padding: 13px 16px;
            border: 1px solid rgba(255, 255, 255, 0.22);
            border-radius: 16px;
            background: rgba(8, 20, 24, 0.72);
            color: var(--text);
            box-shadow: 0 18px 46px rgba(0, 0, 0, 0.36);
            backdrop-filter: blur(18px);
            font-size: 13px;
            font-weight: 750;
            text-align: center;
            transform: translate(-50%, 18px);
            opacity: 0;
            pointer-events: none;
            transition: opacity 180ms ease, transform 180ms ease;
        }

        .toast.show {
            opacity: 1;
            transform: translate(-50%, 0);
        }

        @media (max-width: 560px) {
            body {
                background-attachment: scroll;
            }

            .page {
                padding: 16px;
            }

            .login-card {
                padding: 24px;
                border-radius: 26px;
            }

            .brand {
                align-items: flex-start;
                flex-direction: column;
            }

            .login-header h1 {
                font-size: 34px;
            }

            .watch-eyes {
                width: 96px;
                height: 44px;
                flex-basis: 96px;
            }

            .human-eye {
                width: 35px;
                height: 22px;
            }

            .social-row {
                grid-template-columns: 1fr;
            }

            .form-row {
                align-items: flex-start;
                flex-direction: column;
            }
        }

        @media (max-height: 740px) {
            .page {
                padding: 14px;
            }

            .login-card {
                padding: 24px;
            }

            .brand {
                margin-bottom: 18px;
            }

            .brand-mark {
                width: 40px;
                height: 40px;
            }

            .login-header {
                margin-bottom: 18px;
            }

            .login-header h1 {
                font-size: 34px;
            }

            .login-header p {
                margin-top: 6px;
            }

            .social-row {
                margin-bottom: 14px;
            }

            .social-btn {
                min-height: 44px;
            }

            .divider {
                margin-bottom: 14px;
            }

            .field {
                margin-bottom: 11px;
            }

            .field input {
                min-height: 48px;
            }

            .primary-btn {
                min-height: 50px;
            }

            .message {
                margin-top: 8px;
            }

            .signup {
                margin-top: 10px;
            }
        }

        @media (max-height: 640px) {
            .login-header p,
            .social-row,
            .divider {
                display: none;
            }

            .brand {
                margin-bottom: 14px;
            }

            .login-header {
                margin-bottom: 14px;
            }

            .form-row {
                margin: 4px 0 14px;
            }

            .message {
                min-height: 18px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 1ms !important;
                animation-iteration-count: 1 !important;
                scroll-behavior: auto !important;
                transition-duration: 1ms !important;
            }
        }

        @keyframes cardIn {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.98);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes lightSweep {
            from {
                opacity: 0.52;
                transform: translateX(-2%);
            }
            to {
                opacity: 0.86;
                transform: translateX(2%);
            }
        }

        @keyframes naturalBlink {
            0%,
            91%,
            100% {
                transform: scaleY(1);
            }
            94% {
                transform: scaleY(0.12);
            }
            96% {
                transform: scaleY(1);
            }
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>
<body>
    <main class="page">
        <section class="login-wrap" aria-label="Login">
            <form class="login-card" id="loginForm" novalidate>
                <div class="brand">
                    <div class="brand-left">
                        <span class="brand-mark" aria-hidden="true">
                            <svg viewBox="0 0 24 24" fill="none">
                                <path d="M12 3L20 8V16L12 21L4 16V8L12 3Z" stroke="currentColor" stroke-width="1.8"/>
                                <path d="M8.5 12H15.5M12 8.5V15.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                            </svg>
                        </span>
                        <span class="brand-name">Your Brand</span>
                    </div>
                    <span class="status-pill">Secure</span>
                </div>

                <header class="login-header">
                    <div class="login-title-row">
                        <h1>Sign in</h1>
                        <div class="watch-eyes" id="watchEyes" aria-hidden="true">
                            <span class="human-eye">
                                <span class="eye-pupil"></span>
                            </span>
                            <span class="human-eye">
                                <span class="eye-pupil"></span>
                            </span>
                        </div>
                    </div>
                    <p>Welcome back. Please enter your details.</p>
                </header>

                <div class="social-row">
                    <button class="social-btn" type="button" data-toast="Google sign in selected.">
                        <span class="social-icon">G</span>
                        Google
                    </button>
                    <button class="social-btn" type="button" data-toast="GitHub sign in selected.">
                        <span class="social-icon">GH</span>
                        GitHub
                    </button>
                </div>

                <div class="divider">or</div>

                <div class="field">
                    <label for="email">Email address</label>
                    <div class="input-wrap">
                        <input id="email" name="email" type="email" placeholder="you@example.com" autocomplete="email" required>
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                            <path d="M4 6.75H20V17.25H4V6.75Z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/>
                            <path d="M5 7.5L12 13L19 7.5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </div>
                </div>

                <div class="field password">
                    <label for="password">Password</label>
                    <div class="input-wrap">
                        <input id="password" name="password" type="password" placeholder="Enter your password" autocomplete="current-password" required>
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                            <path d="M7 10V8A5 5 0 0 1 17 8V10" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
                            <path d="M6 10H18V20H6V10Z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/>
                            <path d="M12 14V16" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
                        </svg>
                        <button class="icon-btn" id="togglePassword" type="button" aria-label="Show password">
                            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                                <path d="M3.5 12S6.5 6.5 12 6.5S20.5 12 20.5 12S17.5 17.5 12 17.5S3.5 12 3.5 12Z" stroke="currentColor" stroke-width="1.7"/>
                                <path d="M12 14.5A2.5 2.5 0 1 0 12 9.5A2.5 2.5 0 0 0 12 14.5Z" stroke="currentColor" stroke-width="1.7"/>
                            </svg>
                        </button>
                    </div>
                    <div class="strength" id="strength" data-level="0" aria-hidden="true">
                        <span></span>
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                </div>

                <div class="form-row">
                    <label class="remember" for="remember">
                        <input id="remember" name="remember" type="checkbox">
                        Remember me
                    </label>
                    <button class="ghost-link" type="button" data-toast="Recovery flow opened.">Forgot password?</button>
                </div>

                <button class="primary-btn" id="submitBtn" type="submit">
                    <span class="spinner" aria-hidden="true"></span>
                    <span class="btn-text">Sign in</span>
                </button>

                <p class="message" id="message" aria-live="polite"></p>

                <p class="signup">
                    No account yet?
                    <button class="ghost-link" type="button" data-toast="Registration flow opened.">Create one</button>
                </p>
            </form>
        </section>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script>
        const card = document.querySelector(".login-card");
        const form = document.getElementById("loginForm");
        const email = document.getElementById("email");
        const password = document.getElementById("password");
        const togglePassword = document.getElementById("togglePassword");
        const watchEyes = document.getElementById("watchEyes");
        const strength = document.getElementById("strength");
        const submitBtn = document.getElementById("submitBtn");
        const btnText = submitBtn.querySelector(".btn-text");
        const message = document.getElementById("message");
        const toast = document.getElementById("toast");
        let toastTimer;
        let passwordIsActive = false;

        card.addEventListener("pointermove", (event) => {
            const rect = card.getBoundingClientRect();
            const x = event.clientX - rect.left;
            const y = event.clientY - rect.top;
            const rotateY = ((x / rect.width) - 0.5) * 4;
            const rotateX = ((y / rect.height) - 0.5) * -4;
            card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
        });

        card.addEventListener("pointerleave", () => {
            card.style.transform = "rotateX(0deg) rotateY(0deg)";
        });

        document.addEventListener("pointermove", (event) => {
            if (passwordIsActive) return;

            const rect = watchEyes.getBoundingClientRect();
            const eyeCenterX = rect.left + rect.width / 2;
            const eyeCenterY = rect.top + rect.height / 2;
            const deltaX = event.clientX - eyeCenterX;
            const deltaY = event.clientY - eyeCenterY;
            const distance = Math.max(Math.hypot(deltaX, deltaY), 1);
            const moveX = (deltaX / distance) * 5;
            const moveY = (deltaY / distance) * 3.5;

            watchEyes.style.setProperty("--eye-x", `${moveX}px`);
            watchEyes.style.setProperty("--eye-y", `${moveY}px`);
            watchEyes.classList.add("active");
        });

        form.addEventListener("focusin", (event) => {
            if (event.target === password || event.target === togglePassword) {
                closeWatchEye();
                return;
            }

            openWatchEye();
        });

        form.addEventListener("focusout", () => {
            window.setTimeout(() => {
                if (document.activeElement !== password && document.activeElement !== togglePassword) {
                    openWatchEye();
                }
            }, 100);
        });

        email.addEventListener("focus", openWatchEye);
        email.addEventListener("input", openWatchEye);
        password.addEventListener("focus", closeWatchEye);
        password.addEventListener("input", () => {
            closeWatchEye();
            updateStrength();
        });
        password.addEventListener("blur", () => {
            passwordIsActive = false;
            window.setTimeout(() => {
                if (document.activeElement !== password && document.activeElement !== togglePassword) openWatchEye();
            }, 120);
        });

        togglePassword.addEventListener("click", () => {
            const showPassword = password.type === "password";
            password.type = showPassword ? "text" : "password";
            togglePassword.setAttribute("aria-label", showPassword ? "Hide password" : "Show password");
            closeWatchEye();
        });

        function updateStrength() {
            const value = password.value;
            let level = 0;

            if (value.length >= 4) level += 1;
            if (value.length >= 8) level += 1;
            if (/[A-Z]/.test(value) && /[a-z]/.test(value)) level += 1;
            if (/\d/.test(value) || /[^A-Za-z0-9]/.test(value)) level += 1;

            strength.dataset.level = String(Math.min(level, 4));
        }

        document.querySelectorAll("[data-toast]").forEach((button) => {
            button.addEventListener("click", () => showToast(button.dataset.toast));
        });

        form.addEventListener("submit", (event) => {
            event.preventDefault();
            const emailValue = email.value.trim();
            const passwordValue = password.value.trim();

            message.className = "message";

            if (!emailValue || !email.checkValidity()) {
                showMessage("Please enter a valid email address.", "error");
                email.focus();
                return;
            }

            if (passwordValue.length < 6) {
                showMessage("Password must be at least 6 characters.", "error");
                password.focus();
                return;
            }

            submitBtn.disabled = true;
            submitBtn.classList.add("loading");
            btnText.textContent = "Signing in";
            showMessage("Checking your details...", "");

            window.setTimeout(() => {
                submitBtn.disabled = false;
                submitBtn.classList.remove("loading");
                btnText.textContent = "Sign in";
                showMessage("Signed in successfully.", "success");
            }, 900);
        });

        function showMessage(text, type) {
            message.textContent = text;
            message.className = type ? `message ${type}` : "message";
        }

        function showToast(text) {
            window.clearTimeout(toastTimer);
            toast.textContent = text;
            toast.classList.add("show");
            toastTimer = window.setTimeout(() => {
                toast.classList.remove("show");
            }, 2400);
        }

        function openWatchEye() {
            passwordIsActive = false;
            watchEyes.classList.remove("closed");
            watchEyes.classList.add("active");
        }

        function closeWatchEye() {
            passwordIsActive = true;
            watchEyes.classList.add("closed");
            watchEyes.classList.remove("active");
            watchEyes.style.setProperty("--eye-x", "0px");
            watchEyes.style.setProperty("--eye-y", "0px");
        }
    </script>
</body>
</html>
